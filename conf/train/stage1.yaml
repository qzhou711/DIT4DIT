# Stage 1: Video backbone LoRA finetuning
# Usage: python tools/train.py --stage 1 --config conf/train/stage1.yaml

model:
  model_id: "nvidia/Cosmos-Predict2-2B-Video2World"
  pooling_mode: "all_tokens"       # Match paper: full spatial-temporal tokens
  feature_layers: [19]             # Hidden states from transformer block 19
  num_latent_frames: 5
  lora:
    rank: 16
    alpha: 16
    dropout: 0.0
    target_modules:
      - "attn1.to_q"
      - "attn1.to_k"
      - "attn1.to_v"
      - "attn1.to_out.0"
      - "attn2.to_q"
      - "attn2.to_k"
      - "attn2.to_v"
      - "attn2.to_out.0"
      - "ff.net.0.proj"
      - "ff.net.2"

data:
  repo_id: "pierre818191/UnitreeBagClose"
  num_train_episodes: 400
  val_split: 0.05
  num_cond_frames: 2               # Conditioning latent frames (past)
  num_pred_frames: 3               # Prediction latent frames (future)

training:
  lr: 1.778e-4                     # Paper Table IV value
  warmup_steps: 1000
  total_steps: 27000               # Paper Table IV (mimic dataset)
  weight_decay: 0.1
  grad_clip: 1.0
  micro_batch_size: 4
  gradient_accumulation_steps: 64  # Effective batch = 4 * 64 = 256
  lr_schedule: "constant"
  dtype: "bfloat16"
  num_workers: 4
  output_dir: "checkpoints/"
  log_every: 10
  save_every: 1000
  validate: false
  noise_schedule:
    video: "logit_normal"
  wandb_project: null
  wandb_run_name: "stage1-run"
