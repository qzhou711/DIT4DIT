# Stage 2: Action decoder training (frozen backbone)
# Usage: python tools/train.py --stage 2 \
#            --config conf/train/stage2.yaml \
#            --backbone_checkpoint checkpoints/stage1/final

model:
  model_id: "nvidia/Cosmos-Predict2-2B-Video2World"
  pooling_mode: "all_tokens"       # Full spatial-temporal tokens (paper-accurate)
  feature_layers: [19]
  num_latent_frames: 5
  lora:
    rank: 16
    alpha: 16
  decoder:
    action_dim: 16
    proprio_dim: 16
    hidden_dim: 512
    num_layers: 8
    num_heads: 8
    mlp_ratio: 4
    context_dim: 2048              # Cosmos transformer hidden dim
    chunk_size: 16
    proprio_mask_prob: 0.1

data:
  repo_id: "pierre818191/UnitreeBagClose"
  num_train_episodes: 400
  val_split: 0.05
  num_cond_frames: 2
  num_pred_frames: 3

training:
  lr: 1e-4
  warmup_steps: 1000
  total_steps: 26000
  weight_decay: 0.0
  grad_clip: 10.0
  micro_batch_size: 4
  gradient_accumulation_steps: 8   # Effective batch = 4 * 8 = 32
  lr_schedule: "linear_decay"
  dtype: "bfloat16"
  num_workers: 4
  output_dir: "checkpoints/"
  log_every: 10
  save_every: 1000
  eval_every: 500
  validate: true
  noise_schedule:
    video: "logit_normal"
    action: "sqrt_minus_eps"       # Correct paper distribution: T_a(τ) ∝ √τ - 0.001
  wandb_project: null
  wandb_run_name: "stage2-run"
